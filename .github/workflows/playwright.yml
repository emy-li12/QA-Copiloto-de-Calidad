name: QA — Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Frontend URL a testear'
        required: false
        default: 'https://emy-task-frontend.vercel.app'
      api_url:
        description: 'Backend API URL'
        required: false
        default: 'https://emytask-backend.onrender.com'
  repository_dispatch:
    types: [run-qa-tests]

env:
  BASE_URL: ${{ github.event.inputs.base_url || github.event.client_payload.base_url || 'https://emy-task-frontend.vercel.app' }}
  API_URL: ${{ github.event.inputs.api_url || github.event.client_payload.api_url || 'https://emytask-backend.onrender.com' }}

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Despertar backend en Render
  # ─────────────────────────────────────────────
  warmup:
    name: Wake up backend (Render)
    runs-on: ubuntu-latest
    steps:
      - name: Ping hasta que el backend responda
        run: |
          echo "Despertando backend en $API_URL ..."
          for i in $(seq 1 8); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$API_URL" || echo "000")
            echo "Intento $i: HTTP $STATUS"
            if [ "$STATUS" != "000" ]; then
              echo "Backend listo."
              exit 0
            fi
            sleep 15
          done
          echo "Backend no respondio a tiempo."
          exit 1

  # ─────────────────────────────────────────────
  # Job 2: Construir imagen Docker con Node 22
  # y todos los browsers de Playwright.
  # El resultado se guarda en caché de GHA para
  # que los jobs de test la restauren rápido.
  # ─────────────────────────────────────────────
  build-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir imagen y guardar en caché
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: qa-playwright:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Job 3 (matrix): Correr cada suite dentro del
  # contenedor Docker.
  # ─────────────────────────────────────────────
  test:
    name: Playwright — ${{ matrix.suite }}
    needs: [warmup, build-image]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        suite: [auth, tasks, notifications, api]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restaurar imagen desde caché
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: qa-playwright:latest
          cache-from: type=gha

      - name: Crear directorios de salida en el runner
        run: mkdir -p reports/html test-results

      - name: Correr tests — ${{ matrix.suite }}
        run: |
          docker run --rm \
            -e BASE_URL="${{ env.BASE_URL }}" \
            -e API_URL="${{ env.API_URL }}" \
            -e CI=true \
            -v "${{ github.workspace }}/reports:/app/reports" \
            -v "${{ github.workspace }}/test-results:/app/test-results" \
            qa-playwright \
            npx playwright test e2e/tests/${{ matrix.suite }}/

      - name: Subir reporte HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-${{ matrix.suite }}-${{ github.run_id }}
          path: reports/html/
          retention-days: 30

      - name: Subir traces y screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: traces-${{ matrix.suite }}-${{ github.run_id }}
          path: test-results/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 4: Resumen final
  # ─────────────────────────────────────────────
  summary:
    name: Resumen de resultados
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Estado final
        run: |
          if [ "${{ needs.test.result }}" = "success" ]; then
            echo "✅ Todos los tests pasaron."
          else
            echo "❌ Hay tests fallidos. Revisar reportes antes de desplegar."
            exit 1
          fi
